# Restrict checking to first-party runtime and tests.
project-includes = [
    "src/**/*.py",
    "tests/**/*.py",
]

# Keep excludes explicit and avoid accidental broadening via editor temp dirs.
project-excludes = [
    "**/.venv/**",
    "**/__pycache__/**",
    "**/.pytest_cache/**",
    "**/.ruff_cache/**",
]

# Deterministic import resolution for src-layout package and typed tests.
search-path = ["src", "."]
disable-search-path-heuristics = true
use-ignore-files = true

# Align with repository runtime target.
python-version = "3.13"

# Keep typing strict and explicit for future agents and modules.
untyped-def-behavior = "check-and-infer-return-type"
infer-with-first-use = true
ignore-errors-in-generated-code = false
replace-imports-with-any = []
ignore-missing-imports = []
enabled-ignores = ["type", "pyrefly"]
strict-callable-subtyping = true

[errors]
# Variance suggestions on Protocol type vars are informational noise for now.
variance-mismatch = false
