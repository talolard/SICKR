services:
  backend:
    image: ${BACKEND_IMAGE_REF}
    restart: unless-stopped
    env_file:
      - backend.env
      - ${BACKEND_SECRETS_ENV_FILE}
    ports:
      - ${BACKEND_HOST_PORT}:8000
    volumes:
      - ${HOST_ARTIFACT_ROOT_DIR}:/var/lib/ikea-agent/artifacts

  ui:
    image: ${UI_IMAGE_REF}
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ui.env
    ports:
      - ${UI_HOST_PORT}:3000
