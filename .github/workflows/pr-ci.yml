name: PR CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  checks: write

jobs:
  workflow-lint:
    name: Workflow Lint (actionlint, shellcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        run: bash scripts/ci/run_workflow_lint.sh

  backend:
    name: Backend (ruff, pyrefly, pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python + uv cache
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install backend dependencies
        run: uv sync --all-groups --frozen

      - name: Run Ruff (annotations)
        run: uv run ruff check --output-format=github .

      - name: Run Pyrefly (annotations)
        run: uv run pyrefly check --output-format=github

      - name: Run backend tests (JUnit + coverage)
        id: backend_tests
        env:
          GOOGLE_API_KEY: ci-fake-google-key
          FAI_AI_API_KEY: ci-fake-fal-key
        run: |
          mkdir -p artifacts
          set +e
          uv run pytest \
            --junitxml=artifacts/pytest-junit.xml \
            --cov=src/ikea_agent \
            --cov=tests \
            --cov-report=xml:artifacts/backend-coverage.xml \
            --cov-report=json:artifacts/backend-coverage.json
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload backend coverage artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: |
            artifacts/backend-coverage.json
            artifacts/backend-coverage.xml
          if-no-files-found: error

      - name: Publish backend test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: Backend Pytest
          path: artifacts/pytest-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Fail if backend tests failed
        if: ${{ steps.backend_tests.outputs.exit_code != '0' }}
        run: |
          echo "Backend tests failed. See annotations and Backend Pytest report."
          exit 1

  migration-stairway:
    name: Migration Stairway (Postgres)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect migration-surface changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            migrations:
              - 'alembic.ini'
              - 'migrations/**'
              - 'scripts/deploy/alembic_config.py'
              - 'scripts/deploy/apply_migrations.py'
              - 'scripts/deploy/migration_test_support.py'
              - 'scripts/ci/run_migration_validation.sh'
              - 'scripts/docker_deps/seed_postgres.py'
              - 'tests/shared/test_migrations.py'
              - 'tests/shared/test_migration_stairway.py'

      - name: Set up Python + uv cache
        if: ${{ github.event_name == 'workflow_dispatch' || steps.changes.outputs.migrations == 'true' }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install backend dependencies
        if: ${{ github.event_name == 'workflow_dispatch' || steps.changes.outputs.migrations == 'true' }}
        run: uv sync --all-groups --frozen

      - name: Run migration validation suite
        if: ${{ github.event_name == 'workflow_dispatch' || steps.changes.outputs.migrations == 'true' }}
        run: bash scripts/ci/run_migration_validation.sh 0

      - name: Skip migration validation when migration surface is unchanged
        if: ${{ github.event_name != 'workflow_dispatch' && steps.changes.outputs.migrations != 'true' }}
        run: echo "Migration-related files did not change; skipping stairway validation."

  frontend-unit:
    name: Frontend Unit (eslint, tsc, vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.6.3
          run_install: false

      - name: Set up Node + pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint with GitHub annotations
        id: frontend_lint
        run: |
          mkdir -p ../artifacts
          set +e
          pnpm exec eslint . --max-warnings=0 --format json --output-file ../artifacts/eslint.json
          eslint_exit=$?
          # shellcheck disable=SC2016
          node -e '
          const fs = require("fs");
          const path = "../artifacts/eslint.json";
          const raw = fs.existsSync(path) ? fs.readFileSync(path, "utf8") : "[]";
          const report = JSON.parse(raw || "[]");
          let count = 0;
          for (const file of report) {
            const filePath = file.filePath || "";
            for (const msg of file.messages || []) {
              count += 1;
              const level = "error";
              const line = msg.line || 1;
              const col = msg.column || 1;
              const rule = msg.ruleId ? ` [${msg.ruleId}]` : "";
              const text = (msg.message || "ESLint issue").replace(/\r?\n/g, " ");
              process.stdout.write(`::${level} file=${filePath},line=${line},col=${col}::${text}${rule}\n`);
            }
          }
          process.stdout.write(`ESLint issues: ${count}\n`);
          '
          echo "exit_code=${eslint_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Fail if ESLint failed
        if: ${{ steps.frontend_lint.outputs.exit_code != '0' }}
        run: |
          echo "Frontend lint failed. See annotations above."
          exit 1

      - name: Run TypeScript check with GitHub annotations
        id: frontend_typecheck
        run: |
          mkdir -p ../artifacts
          set +e
          pnpm typecheck --pretty false > ../artifacts/tsc.txt 2>&1
          typecheck_exit=$?
          # shellcheck disable=SC2016
          node -e '
          const fs = require("fs");
          const lines = fs.existsSync("../artifacts/tsc.txt")
            ? fs.readFileSync("../artifacts/tsc.txt", "utf8").split(/\r?\n/)
            : [];
          const regex = /^(.+?)\((\d+),(\d+)\):\s+(error|warning)\s+(TS\d+):\s+(.*)$/;
          let count = 0;
          for (const line of lines) {
            const match = line.match(regex);
            if (!match) continue;
            count += 1;
            const [, file, ln, col, sev, code, msg] = match;
            const level = sev === "error" ? "error" : "warning";
            const text = `${code}: ${msg}`.replace(/\r?\n/g, " ");
            process.stdout.write(`::${level} file=${file},line=${ln},col=${col}::${text}\n`);
          }
          process.stdout.write(`TypeScript diagnostics: ${count}\n`);
          '
          cat ../artifacts/tsc.txt
          echo "exit_code=${typecheck_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Fail if TypeScript check failed
        if: ${{ steps.frontend_typecheck.outputs.exit_code != '0' }}
        run: |
          echo "Frontend typecheck failed. See annotations above."
          exit 1

      - name: Run frontend unit tests (Vitest + JUnit + coverage)
        id: frontend_tests
        run: |
          mkdir -p ../artifacts
          set +e
          rm -rf coverage
          pnpm exec vitest run --coverage --reporter=default --reporter=junit --outputFile.junit=../artifacts/vitest-junit.xml
          test_exit=$?
          echo "exit_code=${test_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload frontend coverage artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: |
            ui/coverage/coverage-summary.json
            ui/coverage/lcov.info
          if-no-files-found: error

      - name: Publish frontend unit test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: Frontend Vitest
          path: artifacts/vitest-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Fail if frontend unit tests failed
        if: ${{ steps.frontend_tests.outputs.exit_code != '0' }}
        run: |
          echo "Frontend unit tests failed. See annotations and Frontend Vitest report."
          exit 1

  coverage:
    name: Coverage (backend + frontend)
    needs: [backend, frontend-unit]
    if: ${{ needs.backend.result == 'success' && needs['frontend-unit'].result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      backend_source_percent: ${{ steps.export_report.outputs.backend_source_percent }}
      backend_tests_percent: ${{ steps.export_report.outputs.backend_tests_percent }}
      frontend_source_percent: ${{ steps.export_report.outputs.frontend_source_percent }}
      frontend_tests_percent: ${{ steps.export_report.outputs.frontend_tests_percent }}
      patch_percent: ${{ steps.export_report.outputs.patch_percent }}
      baseline_available: ${{ steps.export_report.outputs.baseline_available }}
      total_regressed: ${{ steps.export_report.outputs.total_regressed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download backend coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage
          path: artifacts/backend

      - name: Download frontend coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: artifacts/frontend

      - name: Capture pull request diff
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p artifacts
          git diff --unified=0 --no-color "${BASE_SHA}...${HEAD_SHA}" > artifacts/changed.diff

      - name: Find default-branch coverage baseline
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref == github.event.repository.default_branch }}
        id: find_baseline
        uses: actions/github-script@v9
        with:
          script: |
            const workflowId = 'pr-ci.yml';
            const defaultBranch = context.payload.repository.default_branch;
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              branch: defaultBranch,
              event: 'push',
              status: 'success',
              per_page: 100,
            });

            for (const run of runs) {
              const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100,
              });
              const artifact = artifacts.find((candidate) => candidate.name === 'coverage-baseline' && !candidate.expired);
              if (!artifact) {
                continue;
              }
              core.setOutput('found', 'true');
              core.setOutput('run_id', String(run.id));
              core.setOutput('run_url', run.html_url);
              return;
            }

            core.setOutput('found', 'false');

      - name: Download default-branch coverage baseline
        if: ${{ steps.find_baseline.outputs.found == 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: coverage-baseline
          path: artifacts/baseline
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find_baseline.outputs.run_id }}

      - name: Build coverage report
        run: |
          mkdir -p coverage-report
          args=(
            --backend-json artifacts/backend/backend-coverage.json
            --frontend-summary artifacts/frontend/coverage-summary.json
            --frontend-lcov artifacts/frontend/lcov.info
            --repo-root "$PWD"
            --summary-md coverage-report/summary.md
            --report-json coverage-report/report.json
            --fail-on-thresholds
          )
          if [ -f artifacts/changed.diff ]; then
            args+=(--diff artifacts/changed.diff)
          fi
          if [ -f artifacts/baseline/report.json ]; then
            args+=(--baseline artifacts/baseline/report.json)
            args+=(--fail-on-regression)
          fi
          python3 scripts/ci_coverage_report.py "${args[@]}"

      - name: Export coverage outputs
        id: export_report
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("coverage-report/report.json").read_text())
          patch_percent = report["patch"]["percent"]
          patch_value = "n/a" if patch_percent is None else f"{patch_percent:.2f}%"

          outputs = {
              "backend_source_percent": f'{report["backend_source"]["percent"]:.2f}%',
              "backend_tests_percent": f'{report["backend_tests"]["percent"]:.2f}%',
              "frontend_source_percent": f'{report["frontend_source"]["percent"]:.2f}%',
              "frontend_tests_percent": f'{report["frontend_tests"]["percent"]:.2f}%',
              "patch_percent": patch_value,
              "baseline_available": str(report["baseline_available"]).lower(),
              "total_regressed": str(report["total_regressed"]).lower(),
          }
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Publish coverage summary
        run: cat coverage-report/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report
          if-no-files-found: error

      - name: Upload default-branch coverage baseline
        if: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-baseline
          path: coverage-report/report.json
          retention-days: 30
          if-no-files-found: error

  e2e-mock:
    name: E2E (Playwright mock)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.6.3
          run_install: false

      - name: Set up Node + pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('ui/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright e2e (mock route) with JUnit
        id: e2e_tests
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: playwright-junit.xml
        run: |
          mkdir -p ../artifacts
          set +e
          pnpm exec playwright test --reporter=line,junit
          e2e_exit=$?
          cp playwright-junit.xml ../artifacts/playwright-junit.xml
          echo "exit_code=${e2e_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish Playwright test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: E2E Playwright Mock
          path: artifacts/playwright-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Playwright report artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ui/playwright-report
          if-no-files-found: ignore

      - name: Fail if e2e tests failed
        if: ${{ steps.e2e_tests.outputs.exit_code != '0' }}
        run: |
          echo "E2E tests failed. See annotations, report artifact, and E2E Playwright Mock report."
          exit 1

  ci-summary:
    name: CI Summary
    if: ${{ always() }}
    needs: [workflow-lint, backend, migration-stairway, frontend-unit, coverage, e2e-mock]
    runs-on: ubuntu-latest
    steps:
      - name: Publish CI summary
        env:
          WORKFLOW_LINT_RESULT: ${{ needs['workflow-lint'].result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          MIGRATION_RESULT: ${{ needs['migration-stairway'].result }}
          FRONTEND_RESULT: ${{ needs['frontend-unit'].result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          COVERAGE_BACKEND_SOURCE: ${{ needs.coverage.outputs.backend_source_percent }}
          COVERAGE_BACKEND_TESTS: ${{ needs.coverage.outputs.backend_tests_percent }}
          COVERAGE_FRONTEND_SOURCE: ${{ needs.coverage.outputs.frontend_source_percent }}
          COVERAGE_FRONTEND_TESTS: ${{ needs.coverage.outputs.frontend_tests_percent }}
          COVERAGE_PATCH: ${{ needs.coverage.outputs.patch_percent }}
          COVERAGE_BASELINE: ${{ needs.coverage.outputs.baseline_available }}
          E2E_MOCK_RESULT: ${{ needs['e2e-mock'].result }}
        run: |
          backend_detail="GitHub annotations + Backend Pytest report"
          frontend_detail="GitHub annotations + Frontend Vitest report"
          e2e_mock_detail="Playwright report artifact + E2E Playwright Mock report"
          coverage_detail="not available"

          if [ "${COVERAGE_RESULT}" = "success" ] || [ "${COVERAGE_RESULT}" = "failure" ]; then
            coverage_detail="backend source ${COVERAGE_BACKEND_SOURCE}, backend tests ${COVERAGE_BACKEND_TESTS}, frontend source ${COVERAGE_FRONTEND_SOURCE}, frontend tests ${COVERAGE_FRONTEND_TESTS}, patch ${COVERAGE_PATCH}"
            if [ "${COVERAGE_BASELINE}" = "true" ]; then
              coverage_detail="${coverage_detail}; default-branch baseline compared"
            else
              coverage_detail="${coverage_detail}; baseline unavailable"
            fi
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## CI Summary

          | Lane | Result | Detail |
          | --- | --- | --- |
          | Workflow Lint (actionlint, shellcheck) | ${WORKFLOW_LINT_RESULT} | validates GitHub Actions YAML plus embedded shell scripts |
          | Backend (ruff, pyrefly, pytest) | ${BACKEND_RESULT} | ${backend_detail} |
          | Migration Stairway (Postgres) | ${MIGRATION_RESULT} | fixture-seeded pgvector Postgres + Alembic stairway validation |
          | Frontend Unit (eslint, tsc, vitest) | ${FRONTEND_RESULT} | ${frontend_detail} |
          | Coverage (backend + frontend) | ${COVERAGE_RESULT} | ${coverage_detail} |
          | E2E (Playwright mock) | ${E2E_MOCK_RESULT} | ${e2e_mock_detail} |
          EOF
