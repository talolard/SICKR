name: Release Branch Governance

on:
  push:
    branches: [release]

permissions:
  contents: read

concurrency:
  group: release-branch-governance
  cancel-in-progress: false

jobs:
  validate-release-push:
    name: Validate release push governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch history
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Fetch main for ancestry checks
        run: |
          set -euo pipefail
          git fetch origin main --no-tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate release push
        run: |
          set -euo pipefail
          python scripts/deploy/release_branch_governance.py push
