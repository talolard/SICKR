name: Release Publish

on:
  pull_request_target:
    types: [closed]
    branches: [release]
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Release commit to publish"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-publish-${{ github.event_name }}-${{ github.event.pull_request.merge_commit_sha || inputs.git_ref || github.run_id }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  UI_ECR_REPOSITORY: ikea-agent/ui
  BACKEND_ECR_REPOSITORY: ikea-agent/backend

jobs:
  publish:
    name: Build, push, manifest, and publish
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'release' &&
        startsWith(github.event.pull_request.title, 'chore(release):')
      )
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.tag }}
      release_version: ${{ steps.version.outputs.version }}
      manifest_artifact_name: release-manifest-${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve release ref
        id: release_ref
        env:
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          INPUT_GIT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_GIT_REF:-}" ]]; then
            echo "ref=${INPUT_GIT_REF}" >> "${GITHUB_OUTPUT}"
          elif [[ -n "${MERGE_COMMIT_SHA:-}" ]]; then
            echo "ref=${MERGE_COMMIT_SHA}" >> "${GITHUB_OUTPUT}"
          else
            echo "Could not determine the release ref to publish."
            exit 1
          fi

      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release_ref.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          version="$(python scripts/deploy/read_release_version.py)"
          tag="$(python scripts/deploy/read_release_version.py --with-v-prefix)"
          git_sha="$(git rev-parse HEAD)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "git_sha=${git_sha}" >> "${GITHUB_OUTPUT}"

      - name: Reject duplicate immutable tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release tag ${RELEASE_TAG} already exists; refusing to overwrite an immutable tag."
            exit 1
          fi

      - name: Require AWS publish role configuration
        env:
          AWS_RELEASE_ROLE_ARN: ${{ vars.AWS_RELEASE_ROLE_ARN }}
        run: |
          set -euo pipefail
          if [[ -z "${AWS_RELEASE_ROLE_ARN}" ]]; then
            echo "Repository variable AWS_RELEASE_ROLE_ARN must be set before release publication can push to ECR."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        id: backend_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/backend.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login_ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:${{ steps.version.outputs.tag }}
            ${{ steps.login_ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:sha-${{ steps.version.outputs.git_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.version.outputs.git_sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push UI image
        id: ui_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/ui.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login_ecr.outputs.registry }}/${{ env.UI_ECR_REPOSITORY }}:${{ steps.version.outputs.tag }}
            ${{ steps.login_ecr.outputs.registry }}/${{ env.UI_ECR_REPOSITORY }}:sha-${{ steps.version.outputs.git_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.version.outputs.git_sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Write release manifest
        run: |
          set -euo pipefail
          python scripts/deploy/write_release_manifest.py \
            --app-version "${{ steps.version.outputs.version }}" \
            --git-tag "${{ steps.version.outputs.tag }}" \
            --git-sha "${{ steps.version.outputs.git_sha }}" \
            --ui-repository "${{ steps.login_ecr.outputs.registry }}/${{ env.UI_ECR_REPOSITORY }}" \
            --ui-digest "${{ steps.ui_image.outputs.digest }}" \
            --backend-repository "${{ steps.login_ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}" \
            --backend-digest "${{ steps.backend_image.outputs.digest }}" \
            --output release-manifest.json

      - name: Upload release manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ steps.version.outputs.tag }}
          path: release-manifest.json
          if-no-files-found: error

      - name: Create immutable Git tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_TAG}" "${{ steps.version.outputs.git_sha }}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "${RELEASE_TAG}" release-manifest.json \
            --verify-tag \
            --title "${RELEASE_TAG}" \
            --generate-notes

  deploy:
    name: Deploy release to EC2 via SSM
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download release manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.publish.outputs.manifest_artifact_name }}
          path: release-manifest

      - name: Require deploy configuration
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          DEPLOY_TARGET_TAG_KEY: ${{ vars.DEPLOY_TARGET_TAG_KEY }}
          DEPLOY_TARGET_TAG_VALUE: ${{ vars.DEPLOY_TARGET_TAG_VALUE }}
          BACKEND_APP_SECRET_ARN: ${{ vars.BACKEND_APP_SECRET_ARN }}
          MODEL_PROVIDER_SECRET_ARN: ${{ vars.MODEL_PROVIDER_SECRET_ARN }}
          OBSERVABILITY_SECRET_ARN: ${{ vars.OBSERVABILITY_SECRET_ARN }}
          DATABASE_SECRET_ARN: ${{ vars.DATABASE_SECRET_ARN }}
        run: |
          set -euo pipefail
          for required_name in \
            AWS_DEPLOY_ROLE_ARN \
            DEPLOY_TARGET_TAG_KEY \
            DEPLOY_TARGET_TAG_VALUE \
            BACKEND_APP_SECRET_ARN \
            MODEL_PROVIDER_SECRET_ARN \
            OBSERVABILITY_SECRET_ARN \
            DATABASE_SECRET_ARN
          do
            if [[ -z "${!required_name:-}" ]]; then
              echo "Repository variable ${required_name} must be set before automatic deploy can run."
              exit 1
            fi
          done

      - name: Configure AWS deploy credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve target instance
        id: target_instance
        env:
          DEPLOY_TARGET_TAG_KEY: ${{ vars.DEPLOY_TARGET_TAG_KEY }}
          DEPLOY_TARGET_TAG_VALUE: ${{ vars.DEPLOY_TARGET_TAG_VALUE }}
        run: |
          set -euo pipefail
          instance_ids="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:${DEPLOY_TARGET_TAG_KEY},Values=${DEPLOY_TARGET_TAG_VALUE}" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].InstanceId' \
              --output text
          )"
          count="$(wc -w <<<"${instance_ids}" | tr -d ' ')"
          if [[ "${count}" -ne 1 ]]; then
            echo "Expected exactly one running deploy target for tag ${DEPLOY_TARGET_TAG_KEY}=${DEPLOY_TARGET_TAG_VALUE}, found ${count}: ${instance_ids}"
            exit 1
          fi
          echo "instance_id=${instance_ids}" >> "${GITHUB_OUTPUT}"

      - name: Render release bundle
        run: |
          set -euo pipefail
          python scripts/deploy/build_release_bundle.py \
            --release-manifest release-manifest/release-manifest.json \
            --output-dir deploy-bundle \
            --backend-app-secret-arn "${{ vars.BACKEND_APP_SECRET_ARN }}" \
            --model-provider-secret-arn "${{ vars.MODEL_PROVIDER_SECRET_ARN }}" \
            --observability-secret-arn "${{ vars.OBSERVABILITY_SECRET_ARN }}" \
            --database-secret-arn "${{ vars.DATABASE_SECRET_ARN }}"

      - name: Write SSM command payload
        run: |
          set -euo pipefail
          python scripts/deploy/write_ssm_command_payload.py \
            --mode deploy \
            --bundle-dir deploy-bundle \
            --output ssm-parameters.json

      - name: Send deploy command
        id: send_command
        env:
          INSTANCE_ID: ${{ steps.target_instance.outputs.instance_id }}
          RELEASE_TAG: ${{ needs.publish.outputs.release_tag }}
        run: |
          set -euo pipefail
          command_id="$(
            aws ssm send-command \
              --instance-ids "${INSTANCE_ID}" \
              --document-name AWS-RunShellScript \
              --comment "Deploy ${RELEASE_TAG}" \
              --parameters file://ssm-parameters.json \
              --query 'Command.CommandId' \
              --output text
          )"
          echo "command_id=${command_id}" >> "${GITHUB_OUTPUT}"

      - name: Wait for deploy command
        env:
          COMMAND_ID: ${{ steps.send_command.outputs.command_id }}
          INSTANCE_ID: ${{ steps.target_instance.outputs.instance_id }}
        run: |
          set -euo pipefail
          while true; do
            status="$(
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --query 'Status' \
                --output text
            )"
            case "${status}" in
              Pending|InProgress|Delayed)
                sleep 5
                ;;
              Success)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query 'StandardOutputContent' \
                  --output text
                exit 0
                ;;
              *)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query 'StandardOutputContent' \
                  --output text || true
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query 'StandardErrorContent' \
                  --output text || true
                echo "Deploy command failed with status ${status}."
                exit 1
                ;;
            esac
          done
