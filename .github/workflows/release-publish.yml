name: Release Publish

on:
  pull_request_target:
    types: [closed]
    branches: [release]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-publish-release-branch
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  UI_ECR_REPOSITORY: ikea-agent/ui
  BACKEND_ECR_REPOSITORY: ikea-agent/backend
  PUBLIC_APP_BASE_URL: https://designagent.talperry.com

jobs:
  publish:
    name: Build, push, manifest, and publish
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'release' &&
      startsWith(github.event.pull_request.title, 'chore(release):')
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.tag }}
      release_version: ${{ steps.version.outputs.version }}
      release_git_sha: ${{ steps.version.outputs.git_sha }}
      release_manifest_artifact_name: release-manifest-${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve release ref
        id: release_ref
        env:
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          if [[ -n "${MERGE_COMMIT_SHA:-}" ]]; then
            echo "ref=${MERGE_COMMIT_SHA}" >> "${GITHUB_OUTPUT}"
          else
            echo "Could not determine the release ref to publish."
            exit 1
          fi

      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release_ref.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          version="$(python scripts/deploy/read_release_version.py)"
          tag="$(python scripts/deploy/read_release_version.py --with-v-prefix)"
          git_sha="$(git rev-parse HEAD)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "git_sha=${git_sha}" >> "${GITHUB_OUTPUT}"

      - name: Reject duplicate immutable tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release tag ${RELEASE_TAG} already exists; refusing to overwrite an immutable tag."
            exit 1
          fi

      - name: Require AWS publish role configuration
        env:
          AWS_RELEASE_ROLE_ARN: ${{ vars.AWS_RELEASE_ROLE_ARN }}
        run: |
          set -euo pipefail
          if [[ -z "${AWS_RELEASE_ROLE_ARN}" ]]; then
            echo "Repository variable AWS_RELEASE_ROLE_ARN must be set before release publication can push to ECR."
            exit 1
          fi

      - name: Resolve release seed contract
        id: bootstrap_inputs
        env:
          IKEA_IMAGE_CATALOG_RUN_ID: ${{ vars.IKEA_IMAGE_CATALOG_RUN_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${IKEA_IMAGE_CATALOG_RUN_ID}" ]]; then
            echo "Repository variable IKEA_IMAGE_CATALOG_RUN_ID must be set before release publication can pin the release seed contract."
            exit 1
          fi

          postgres_seed_version="$(
            python - <<'PY'
from pathlib import Path

from scripts.deploy.seed_fingerprint import calculate_postgres_seed_version

print(calculate_postgres_seed_version(repo_root=Path.cwd()))
PY
          )"
          echo "postgres_seed_version=${postgres_seed_version}" >> "${GITHUB_OUTPUT}"
          echo "image_catalog_run_id=${IKEA_IMAGE_CATALOG_RUN_ID}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS release credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        id: backend_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/backend.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login_ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:${{ steps.version.outputs.tag }}
            ${{ steps.login_ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:sha-${{ steps.version.outputs.git_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.version.outputs.git_sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push UI image
        id: ui_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/ui.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login_ecr.outputs.registry }}/${{ env.UI_ECR_REPOSITORY }}:${{ steps.version.outputs.tag }}
            ${{ steps.login_ecr.outputs.registry }}/${{ env.UI_ECR_REPOSITORY }}:sha-${{ steps.version.outputs.git_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.version.outputs.git_sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Write release manifest
        run: |
          set -euo pipefail
          python scripts/deploy/write_release_manifest.py \
            --app-version "${{ steps.version.outputs.version }}" \
            --git-tag "${{ steps.version.outputs.tag }}" \
            --git-sha "${{ steps.version.outputs.git_sha }}" \
            --postgres-seed-version "${{ steps.bootstrap_inputs.outputs.postgres_seed_version }}" \
            --image-catalog-run-id "${{ steps.bootstrap_inputs.outputs.image_catalog_run_id }}" \
            --ui-repository "${{ steps.login_ecr.outputs.registry }}/${{ env.UI_ECR_REPOSITORY }}" \
            --ui-digest "${{ steps.ui_image.outputs.digest }}" \
            --backend-repository "${{ steps.login_ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}" \
            --backend-digest "${{ steps.backend_image.outputs.digest }}" \
            --output release-manifest.json

      - name: Upload release manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ steps.version.outputs.tag }}
          path: release-manifest.json
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "${RELEASE_TAG}" \
            release-manifest.json \
            --target "${{ steps.version.outputs.git_sha }}" \
            --title "${RELEASE_TAG}" \
            --generate-notes

  deploy:
    name: Deploy release to ECS Fargate
    needs: publish
    runs-on: ubuntu-latest
    concurrency:
      group: designagent-dev-release-operations
      cancel-in-progress: false
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.publish.outputs.release_git_sha }}

      - name: Require deploy configuration
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          ECS_BACKEND_SERVICE_NAME: ${{ vars.ECS_BACKEND_SERVICE_NAME }}
          ECS_UI_SERVICE_NAME: ${{ vars.ECS_UI_SERVICE_NAME }}
        run: |
          set -euo pipefail
          for required_name in AWS_DEPLOY_ROLE_ARN ECS_CLUSTER_NAME ECS_BACKEND_SERVICE_NAME ECS_UI_SERVICE_NAME; do
            if [[ -z "${!required_name:-}" ]]; then
              echo "Repository variable ${required_name} must be set before automatic ECS deploy can run."
              exit 1
            fi
          done

      - name: Download release manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.publish.outputs.release_manifest_artifact_name }}
          path: release-assets

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve release metadata
        id: release
        run: |
          set -euo pipefail
          manifest_path="release-assets/release-manifest.json"
          python - <<'PY' "${manifest_path}" >> "${GITHUB_OUTPUT}"
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          print(f"app_version={payload['app_version']}")
          print(f"git_tag={payload['git_tag']}")
          print(f"git_sha={payload['git_sha']}")
          print(f"backend_image_ref={payload['backend_image']['digest_ref']}")
          print(f"ui_image_ref={payload['ui_image']['digest_ref']}")
          print(f"postgres_seed_version={payload['bootstrap']['postgres_seed_version']}")
          print(f"image_catalog_run_id={payload['bootstrap']['image_catalog_run_id']}")
          PY

      - name: Configure AWS deploy credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Describe backend ECS service
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          ECS_BACKEND_SERVICE_NAME: ${{ vars.ECS_BACKEND_SERVICE_NAME }}
        run: |
          set -euo pipefail
          aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${ECS_BACKEND_SERVICE_NAME}" \
            --query 'services[0]' \
            > backend-service.json

      - name: Describe UI ECS service
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          ECS_UI_SERVICE_NAME: ${{ vars.ECS_UI_SERVICE_NAME }}
        run: |
          set -euo pipefail
          aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${ECS_UI_SERVICE_NAME}" \
            --query 'services[0]' \
            > ui-service.json

      - name: Export ECS network and task-definition metadata
        id: ecs
        run: |
          set -euo pipefail
          python - <<'PY' backend-service.json ui-service.json
          import json
          import subprocess
          import sys
          from pathlib import Path

          backend_service = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          ui_service = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))
          target_group_arn = backend_service["loadBalancers"][0]["targetGroupArn"]
          target_group_payload = json.loads(
              subprocess.check_output(
                  [
                      "aws",
                      "elbv2",
                      "describe-target-groups",
                      "--target-group-arns",
                      target_group_arn,
                  ],
                  text=True,
              )
          )
          load_balancer_arn = target_group_payload["TargetGroups"][0]["LoadBalancerArns"][0]
          load_balancer_payload = json.loads(
              subprocess.check_output(
                  [
                      "aws",
                      "elbv2",
                      "describe-load-balancers",
                      "--load-balancer-arns",
                      load_balancer_arn,
                  ],
                  text=True,
              )
          )
          alb_dns_name = load_balancer_payload["LoadBalancers"][0]["DNSName"]

          backend_network = {"awsvpcConfiguration": backend_service["networkConfiguration"]["awsvpcConfiguration"]}
          Path("backend-network-configuration.json").write_text(
              json.dumps(backend_network, indent=2) + "\n",
              encoding="utf-8",
          )

          output_lines = [
              f"backend_task_definition={backend_service['taskDefinition']}",
              f"ui_task_definition={ui_service['taskDefinition']}",
              f"alb_dns_name={alb_dns_name}",
          ]
          Path.home().joinpath("ecs-output.txt").write_text("\n".join(output_lines) + "\n", encoding="utf-8")
          PY
          cat "${HOME}/ecs-output.txt" >> "${GITHUB_OUTPUT}"

      - name: Download current backend task definition
        env:
          BACKEND_TASK_DEFINITION: ${{ steps.ecs.outputs.backend_task_definition }}
        run: |
          set -euo pipefail
          aws ecs describe-task-definition \
            --task-definition "${BACKEND_TASK_DEFINITION}" \
            --query 'taskDefinition' \
            > backend-task-definition.json

      - name: Download current UI task definition
        env:
          UI_TASK_DEFINITION: ${{ steps.ecs.outputs.ui_task_definition }}
        run: |
          set -euo pipefail
          aws ecs describe-task-definition \
            --task-definition "${UI_TASK_DEFINITION}" \
            --query 'taskDefinition' \
            > ui-task-definition.json

      - name: Render backend task definition
        run: |
          set -euo pipefail
          python scripts/deploy/render_ecs_task_definition.py \
            --input backend-task-definition.json \
            --output backend-task-definition.rendered.json \
            --container backend \
            --image "${{ steps.release.outputs.backend_image_ref }}" \
            --set-env "LOGFIRE_SERVICE_VERSION=${{ steps.release.outputs.app_version }}"

      - name: Render UI task definition
        run: |
          set -euo pipefail
          python scripts/deploy/render_ecs_task_definition.py \
            --input ui-task-definition.json \
            --output ui-task-definition.rendered.json \
            --container ui \
            --image "${{ steps.release.outputs.ui_image_ref }}" \
            --set-env "APP_RELEASE_VERSION=${{ steps.release.outputs.app_version }}" \
            --set-env "BACKEND_PROXY_BASE_URL=http://${{ steps.ecs.outputs.alb_dns_name }}:8000/"

      - name: Register backend task definition revision
        id: backend_taskdef
        run: |
          set -euo pipefail
          task_definition_arn="$(
            aws ecs register-task-definition \
              --cli-input-json file://backend-task-definition.rendered.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )"
          echo "arn=${task_definition_arn}" >> "${GITHUB_OUTPUT}"

      - name: Run backend migrations on Fargate
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          BACKEND_TASK_DEFINITION_ARN: ${{ steps.backend_taskdef.outputs.arn }}
        run: |
          set -euo pipefail
          cat > migration-overrides.json <<'EOF'
          {
            "containerOverrides": [
              {
                "name": "backend",
                "command": ["python", "scripts/deploy/apply_migrations.py"]
              }
            ]
          }
          EOF
          task_arn="$(
            aws ecs run-task \
              --cluster "${ECS_CLUSTER_NAME}" \
              --launch-type FARGATE \
              --task-definition "${BACKEND_TASK_DEFINITION_ARN}" \
              --network-configuration file://backend-network-configuration.json \
              --overrides file://migration-overrides.json \
              --query 'tasks[0].taskArn' \
              --output text
          )"
          if [[ -z "${task_arn}" || "${task_arn}" == "None" ]]; then
            echo "Failed to start migration task."
            exit 1
          fi
          aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER_NAME}" --tasks "${task_arn}"
          exit_code="$(
            aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER_NAME}" \
              --tasks "${task_arn}" \
              --query 'tasks[0].containers[?name==`backend`].exitCode | [0]' \
              --output text
          )"
          if [[ "${exit_code}" != "0" ]]; then
            aws ecs describe-tasks --cluster "${ECS_CLUSTER_NAME}" --tasks "${task_arn}"
            echo "Migration task failed with exit code ${exit_code}."
            exit 1
          fi

      - name: Verify seed state on Fargate
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          BACKEND_TASK_DEFINITION_ARN: ${{ steps.backend_taskdef.outputs.arn }}
          POSTGRES_SEED_VERSION: ${{ steps.release.outputs.postgres_seed_version }}
        run: |
          set -euo pipefail
          cat > seed-verification-overrides.json <<EOF
          {
            "containerOverrides": [
              {
                "name": "backend",
                "command": [
                  "python",
                  "scripts/deploy/verify_seed_state.py",
                  "--expected-postgres-seed-version",
                  "${POSTGRES_SEED_VERSION}"
                ]
              }
            ]
          }
          EOF
          task_arn="$(
            aws ecs run-task \
              --cluster "${ECS_CLUSTER_NAME}" \
              --launch-type FARGATE \
              --task-definition "${BACKEND_TASK_DEFINITION_ARN}" \
              --network-configuration file://backend-network-configuration.json \
              --overrides file://seed-verification-overrides.json \
              --query 'tasks[0].taskArn' \
              --output text
          )"
          if [[ -z "${task_arn}" || "${task_arn}" == "None" ]]; then
            echo "Failed to start seed verification task."
            exit 1
          fi
          aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER_NAME}" --tasks "${task_arn}"
          exit_code="$(
            aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER_NAME}" \
              --tasks "${task_arn}" \
              --query 'tasks[0].containers[?name==`backend`].exitCode | [0]' \
              --output text
          )"
          if [[ "${exit_code}" != "0" ]]; then
            aws ecs describe-tasks --cluster "${ECS_CLUSTER_NAME}" --tasks "${task_arn}"
            echo "Seed verification task failed with exit code ${exit_code}."
            exit 1
          fi

      - name: Update backend ECS service
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          ECS_BACKEND_SERVICE_NAME: ${{ vars.ECS_BACKEND_SERVICE_NAME }}
          BACKEND_TASK_DEFINITION_ARN: ${{ steps.backend_taskdef.outputs.arn }}
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${ECS_BACKEND_SERVICE_NAME}" \
            --task-definition "${BACKEND_TASK_DEFINITION_ARN}" \
            --desired-count 1 \
            --force-new-deployment \
            >/dev/null
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${ECS_BACKEND_SERVICE_NAME}"

      - name: Register UI task definition revision
        id: ui_taskdef
        run: |
          set -euo pipefail
          task_definition_arn="$(
            aws ecs register-task-definition \
              --cli-input-json file://ui-task-definition.rendered.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )"
          echo "arn=${task_definition_arn}" >> "${GITHUB_OUTPUT}"

      - name: Update UI ECS service
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          ECS_UI_SERVICE_NAME: ${{ vars.ECS_UI_SERVICE_NAME }}
          UI_TASK_DEFINITION_ARN: ${{ steps.ui_taskdef.outputs.arn }}
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${ECS_UI_SERVICE_NAME}" \
            --task-definition "${UI_TASK_DEFINITION_ARN}" \
            --desired-count 1 \
            --force-new-deployment \
            >/dev/null
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${ECS_UI_SERVICE_NAME}"

      - name: Verify public deploy routes
        run: |
          set -euo pipefail
          python scripts/deploy/check_public_deploy_endpoints.py \
            --base-url "${PUBLIC_APP_BASE_URL}"
