name: Manual Ref Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build and deploy, for example a branch name or commit SHA."
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-central-1
  UI_ECR_REPOSITORY: ikea-agent/ui
  BACKEND_ECR_REPOSITORY: ikea-agent/backend
  PUBLIC_APP_BASE_URL: https://designagent.talperry.com

jobs:
  deploy:
    name: Build and deploy ref to ECS
    runs-on: ubuntu-latest
    concurrency:
      group: designagent-dev-release-operations
      cancel-in-progress: false
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Require AWS role configuration
        env:
          AWS_RELEASE_ROLE_ARN: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        run: |
          set -euo pipefail
          for required_name in AWS_RELEASE_ROLE_ARN AWS_DEPLOY_ROLE_ARN; do
            if [[ -z "${!required_name:-}" ]]; then
              echo "Repository variable ${required_name} must be set before manual ECS deploy can run."
              exit 1
            fi
          done

      - name: Require ECS service configuration
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          ECS_BACKEND_SERVICE_NAME: ${{ vars.ECS_BACKEND_SERVICE_NAME }}
          ECS_UI_SERVICE_NAME: ${{ vars.ECS_UI_SERVICE_NAME }}
        run: |
          set -euo pipefail
          for required_name in ECS_CLUSTER_NAME ECS_BACKEND_SERVICE_NAME ECS_UI_SERVICE_NAME; do
            if [[ -z "${!required_name:-}" ]]; then
              echo "Repository variable ${required_name} must be set before manual ECS deploy can run."
              exit 1
            fi
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install smoke-check dependency
        run: python -m pip install httpx

      - name: Resolve deploy metadata
        id: meta
        run: |
          set -euo pipefail
          git_sha="$(git rev-parse HEAD)"
          short_sha="${git_sha:0:12}"
          app_version="manual-${short_sha}"
          image_push_tag="manual-${short_sha}-run${GITHUB_RUN_ID}-attempt${GITHUB_RUN_ATTEMPT}"
          echo "git_sha=${git_sha}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"
          echo "image_push_tag=${image_push_tag}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS publish credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        id: backend_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/backend.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.login_ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:${{ steps.meta.outputs.image_push_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.git_sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.app_version }}

      - name: Build and push UI image
        id: ui_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/ui.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.login_ecr.outputs.registry }}/${{ env.UI_ECR_REPOSITORY }}:${{ steps.meta.outputs.image_push_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.git_sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.app_version }}

      - name: Configure AWS deploy credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Describe backend ECS service
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          ECS_BACKEND_SERVICE_NAME: ${{ vars.ECS_BACKEND_SERVICE_NAME }}
        run: |
          set -euo pipefail
          aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${ECS_BACKEND_SERVICE_NAME}" \
            --query 'services[0]' \
            > backend-service.json

      - name: Describe UI ECS service
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          ECS_UI_SERVICE_NAME: ${{ vars.ECS_UI_SERVICE_NAME }}
        run: |
          set -euo pipefail
          aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${ECS_UI_SERVICE_NAME}" \
            --query 'services[0]' \
            > ui-service.json

      - name: Export ECS network and task-definition metadata
        id: ecs
        run: |
          set -euo pipefail
          python - <<'PY' backend-service.json ui-service.json
          import json
          import subprocess
          import sys
          from pathlib import Path

          backend_service = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          ui_service = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))
          target_group_arn = backend_service["loadBalancers"][0]["targetGroupArn"]
          target_group_payload = json.loads(
              subprocess.check_output(
                  [
                      "aws",
                      "elbv2",
                      "describe-target-groups",
                      "--target-group-arns",
                      target_group_arn,
                  ],
                  text=True,
              )
          )
          load_balancer_arn = target_group_payload["TargetGroups"][0]["LoadBalancerArns"][0]
          load_balancer_payload = json.loads(
              subprocess.check_output(
                  [
                      "aws",
                      "elbv2",
                      "describe-load-balancers",
                      "--load-balancer-arns",
                      load_balancer_arn,
                  ],
                  text=True,
              )
          )
          alb_dns_name = load_balancer_payload["LoadBalancers"][0]["DNSName"]

          backend_network = {"awsvpcConfiguration": backend_service["networkConfiguration"]["awsvpcConfiguration"]}
          Path("backend-network-configuration.json").write_text(
              json.dumps(backend_network, indent=2) + "\n",
              encoding="utf-8",
          )

          output_lines = [
              f"backend_task_definition={backend_service['taskDefinition']}",
              f"ui_task_definition={ui_service['taskDefinition']}",
              f"backend_desired_count={backend_service.get('desiredCount', 0)}",
              f"ui_desired_count={ui_service.get('desiredCount', 0)}",
              f"alb_dns_name={alb_dns_name}",
          ]
          Path.home().joinpath("ecs-output.txt").write_text("\n".join(output_lines) + "\n", encoding="utf-8")
          PY
          cat "${HOME}/ecs-output.txt" >> "${GITHUB_OUTPUT}"

      - name: Download current backend task definition
        env:
          BACKEND_TASK_DEFINITION: ${{ steps.ecs.outputs.backend_task_definition }}
        run: |
          set -euo pipefail
          aws ecs describe-task-definition \
            --task-definition "${BACKEND_TASK_DEFINITION}" \
            --query 'taskDefinition' \
            > backend-task-definition.json

      - name: Download current UI task definition
        env:
          UI_TASK_DEFINITION: ${{ steps.ecs.outputs.ui_task_definition }}
        run: |
          set -euo pipefail
          aws ecs describe-task-definition \
            --task-definition "${UI_TASK_DEFINITION}" \
            --query 'taskDefinition' \
            > ui-task-definition.json

      - name: Render backend task definition
        run: |
          set -euo pipefail
          python scripts/deploy/render_ecs_task_definition.py \
            --input backend-task-definition.json \
            --output backend-task-definition.rendered.json \
            --container backend \
            --image "${{ steps.login_ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}@${{ steps.backend_image.outputs.digest }}" \
            --set-env "LOGFIRE_SERVICE_VERSION=${{ steps.meta.outputs.app_version }}"

      - name: Render UI task definition
        run: |
          set -euo pipefail
          python scripts/deploy/render_ecs_task_definition.py \
            --input ui-task-definition.json \
            --output ui-task-definition.rendered.json \
            --container ui \
            --image "${{ steps.login_ecr.outputs.registry }}/${{ env.UI_ECR_REPOSITORY }}@${{ steps.ui_image.outputs.digest }}" \
            --set-env "APP_RELEASE_VERSION=${{ steps.meta.outputs.app_version }}" \
            --set-env "PY_AG_UI_URL=http://${{ steps.ecs.outputs.alb_dns_name }}/ag-ui/" \
            --set-env "BACKEND_PROXY_BASE_URL=http://${{ steps.ecs.outputs.alb_dns_name }}/"

      - name: Register backend task definition revision
        id: backend_taskdef
        run: |
          set -euo pipefail
          task_definition_arn="$(
            aws ecs register-task-definition \
              --cli-input-json file://backend-task-definition.rendered.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )"
          echo "arn=${task_definition_arn}" >> "${GITHUB_OUTPUT}"

      - name: Run backend migrations on Fargate
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          BACKEND_TASK_DEFINITION_ARN: ${{ steps.backend_taskdef.outputs.arn }}
        run: |
          set -euo pipefail
          cat > migration-overrides.json <<'EOF'
          {
            "containerOverrides": [
              {
                "name": "backend",
                "command": ["python", "-m", "scripts.deploy.apply_migrations"]
              }
            ]
          }
          EOF
          task_arn="$(
            aws ecs run-task \
              --cluster "${ECS_CLUSTER_NAME}" \
              --launch-type FARGATE \
              --task-definition "${BACKEND_TASK_DEFINITION_ARN}" \
              --network-configuration file://backend-network-configuration.json \
              --overrides file://migration-overrides.json \
              --query 'tasks[0].taskArn' \
              --output text
          )"
          if [[ -z "${task_arn}" || "${task_arn}" == "None" ]]; then
            echo "Failed to start migration task."
            exit 1
          fi
          aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER_NAME}" --tasks "${task_arn}"
          exit_code="$(
            aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER_NAME}" \
              --tasks "${task_arn}" \
              --query 'tasks[0].containers[?name==`backend`].exitCode | [0]' \
              --output text
          )"
          if [[ "${exit_code}" != "0" ]]; then
            echo "Migration task failed with exit code ${exit_code}."
            exit 1
          fi

      - name: Register UI task definition revision
        id: ui_taskdef
        run: |
          set -euo pipefail
          task_definition_arn="$(
            aws ecs register-task-definition \
              --cli-input-json file://ui-task-definition.rendered.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )"
          echo "arn=${task_definition_arn}" >> "${GITHUB_OUTPUT}"

      - name: Update backend ECS service
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          ECS_BACKEND_SERVICE_NAME: ${{ vars.ECS_BACKEND_SERVICE_NAME }}
          BACKEND_TASK_DEFINITION_ARN: ${{ steps.backend_taskdef.outputs.arn }}
          BACKEND_DESIRED_COUNT: ${{ steps.ecs.outputs.backend_desired_count }}
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${ECS_BACKEND_SERVICE_NAME}" \
            --task-definition "${BACKEND_TASK_DEFINITION_ARN}" \
            --desired-count "${BACKEND_DESIRED_COUNT}" \
            >/dev/null
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time

          cluster = os.environ["ECS_CLUSTER_NAME"]
          service_name = os.environ["ECS_BACKEND_SERVICE_NAME"]
          expected_task_definition = os.environ["BACKEND_TASK_DEFINITION_ARN"]
          deadline = time.monotonic() + 900
          last_payload: dict[str, object] | None = None

          while time.monotonic() < deadline:
              payload = json.loads(
                  subprocess.check_output(
                      [
                          "aws",
                          "ecs",
                          "describe-services",
                          "--cluster",
                          cluster,
                          "--services",
                          service_name,
                      ],
                      text=True,
                  )
              )
              service = payload["services"][0]
              last_payload = service
              deployments = service.get("deployments", [])
              primary = next(
                  (deployment for deployment in deployments if deployment.get("status") == "PRIMARY"),
                  None,
              )
              service_running = int(service.get("runningCount", 0))
              service_desired = int(service.get("desiredCount", 0))
              if (
                  primary
                  and primary.get("taskDefinition") == expected_task_definition
                  and int(primary.get("runningCount", 0)) >= int(primary.get("desiredCount", 0))
                  and int(primary.get("pendingCount", 0)) == 0
                  and service_running >= service_desired
              ):
                  print(
                      json.dumps(
                          {
                              "detail": "Primary backend deployment is serving the desired task count.",
                              "deployment_count": len(deployments),
                              "primary_running": primary.get("runningCount", 0),
                              "primary_desired": primary.get("desiredCount", 0),
                              "service_running": service_running,
                              "service_desired": service_desired,
                              "task_definition": expected_task_definition,
                          },
                          sort_keys=True,
                      )
                  )
                  sys.exit(0)
              time.sleep(15)

          print(json.dumps(last_payload, indent=2, sort_keys=True))
          raise SystemExit("Backend ECS service did not make the new primary task healthy in time.")
          PY

      - name: Update UI ECS service
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          ECS_UI_SERVICE_NAME: ${{ vars.ECS_UI_SERVICE_NAME }}
          UI_TASK_DEFINITION_ARN: ${{ steps.ui_taskdef.outputs.arn }}
          UI_DESIRED_COUNT: ${{ steps.ecs.outputs.ui_desired_count }}
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${ECS_UI_SERVICE_NAME}" \
            --task-definition "${UI_TASK_DEFINITION_ARN}" \
            --desired-count "${UI_DESIRED_COUNT}" \
            >/dev/null
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${ECS_UI_SERVICE_NAME}"

      - name: Smoke check public endpoints
        run: |
          set -euo pipefail
          python scripts/deploy/check_public_deploy_endpoints.py \
            --base-url "${PUBLIC_APP_BASE_URL}"
          python - <<'PY'
          import json
          import urllib.request

          base_url = "https://designagent.talperry.com"
          for path in ("/api/agents", "/api/agents/search/metadata"):
              request = urllib.request.Request(f"{base_url}{path}")
              with urllib.request.urlopen(request, timeout=30) as response:
                  if response.status != 200:
                      raise SystemExit(f"{path} returned {response.status}")
                  json.loads(response.read().decode("utf-8"))
          PY
