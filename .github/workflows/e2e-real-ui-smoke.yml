name: E2E Real UI Smoke

on:
  workflow_run:
    workflows: ["PR CI", "Dependency Review"]
    types: [completed]

concurrency:
  group: e2e-real-ui-smoke-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  checks: write

jobs:
  gate:
    name: Evaluate upstream workflow status
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.evaluate.outputs.should_run }}
      head_sha: ${{ steps.evaluate.outputs.head_sha }}
      pr_number: ${{ steps.evaluate.outputs.pr_number }}
    steps:
      - name: Check PR CI and dependency review status for this SHA
        id: evaluate
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const pullRequests = run.pull_requests || [];
            const headSha = run.head_sha;

            core.setOutput('head_sha', headSha);
            if (pullRequests.length === 0) {
              core.setOutput('should_run', 'false');
              core.summary
                .addHeading('E2E real UI smoke gate')
                .addRaw('No associated pull request was found for this workflow run.')
                .write();
              return;
            }

            const prNumber = String(pullRequests[0].number);
            core.setOutput('pr_number', prNumber);

            const targetWorkflowNames = ['PR CI', 'Dependency Review'];
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              event: 'pull_request',
              head_sha: headSha,
              per_page: 100,
            });

            const latestByName = new Map();
            for (const workflowRun of runs) {
              if (!targetWorkflowNames.includes(workflowRun.name)) {
                continue;
              }
              const current = latestByName.get(workflowRun.name);
              if (!current || new Date(workflowRun.created_at) > new Date(current.created_at)) {
                latestByName.set(workflowRun.name, workflowRun);
              }
            }

            const rows = targetWorkflowNames.map((name) => {
              const workflowRun = latestByName.get(name);
              return [
                name,
                workflowRun?.conclusion ?? 'missing',
                workflowRun?.html_url ?? '',
              ];
            });
            core.summary
              .addHeading('E2E real UI smoke gate')
              .addTable([
                [
                  { data: 'Workflow', header: true },
                  { data: 'Conclusion', header: true },
                  { data: 'Run URL', header: true },
                ],
                ...rows,
              ]);

            const shouldRun = targetWorkflowNames.every((name) => {
              const workflowRun = latestByName.get(name);
              return workflowRun && workflowRun.conclusion === 'success';
            });

            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            core.summary.addRaw(
              shouldRun
                ? 'All upstream PR workflows succeeded for this commit. Running real UI smoke.'
                : 'Skipping real UI smoke until both upstream PR workflows succeed for this commit.'
            );
            await core.summary.write();

  smoke:
    name: Real backend smoke against PR head
    needs: gate
    if: ${{ needs.gate.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Set up Python + uv cache
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install backend dependencies
        run: uv sync --all-groups --frozen

      - name: Start snapshot-backed Postgres
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/worktree/deps.sh up --slot 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
          run_install: false

      - name: Set up Node + pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd ui && pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('ui/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: cd ui && pnpm exec playwright install --with-deps chromium

      - name: Run deterministic real-backend smoke
        env:
          ARTIFACT_ROOT_DIR: artifacts
        run: make ui-test-e2e-real-ui-smoke

      - name: Upload Playwright report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real-ui-smoke-playwright-report
          path: ui/playwright-report
          if-no-files-found: ignore

      - name: Upload smoke logs and test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real-ui-smoke-artifacts
          path: |
            artifacts
            ui/test-results
          if-no-files-found: ignore

      - name: Stop snapshot-backed Postgres
        if: ${{ always() }}
        run: ./scripts/worktree/deps.sh down --slot 0
