name: Release PR Governance

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]
    branches: [release]

permissions:
  contents: read

jobs:
  validate-release-pr:
    name: Validate release PR governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base repository content
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate release PR source
        run: |
          set -euo pipefail
          python scripts/deploy/release_branch_governance.py pull-request
