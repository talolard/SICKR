<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.23.8/dist/css/uikit.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/uikit@3.23.8/dist/js/uikit.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/uikit@3.23.8/dist/js/uikit-icons.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <title>{% block title %}IKEA Semantic Search{% endblock %}</title>
    <style>
      :root {
        --bg: #f2efe8;
        --card: #ffffff;
        --ink: #1f2a37;
        --accent: #0058a3;
        --accent-soft: #e7f0fb;
        --warn: #9a3412;
      }
      body {
        margin: 0;
        background: radial-gradient(circle at 0% 0%, #dce8f8, var(--bg) 50%);
        color: var(--ink);
        font-family: "Georgia", "Times New Roman", serif;
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 1.25rem 1.25rem 6rem;
      }
      .top-nav {
        display: flex;
        gap: 0.6rem;
        margin-bottom: 1rem;
      }
      .top-nav a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }
      .card {
        background: var(--card);
        border: 1px solid #d8d8d8;
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .grid {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      .control-block {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 0.6rem;
      }
      .control-row {
        display: grid;
        grid-template-columns: auto minmax(64px, 1fr) auto minmax(64px, 1fr) auto minmax(64px, 1fr);
        gap: 0.35rem;
        align-items: center;
      }
      .minor-label {
        font-size: 0.85rem;
        color: #475569;
      }
      .hero-field {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        margin-bottom: 0.9rem;
      }
      .hero-field input {
        font-size: 1.05rem;
        padding: 0.7rem;
      }
      input,
      select {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 0.45rem 0.55rem;
      }
      input:focus,
      select:focus,
      summary:focus {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .more-filters {
        margin-top: 0.8rem;
      }
      .actions {
        display: flex;
        gap: 0.6rem;
        margin-top: 0.9rem;
      }
      .checkbox-row label {
        display: inline;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.9rem;
      }
      .chip {
        background: var(--accent-soft);
        color: #0c4a6e;
        border: 1px solid #bfdbfe;
        border-radius: 999px;
        padding: 0.2rem 0.6rem;
        font-size: 0.85rem;
      }
      .btn {
        border: none;
        background: var(--accent);
        color: #fff;
        padding: 0.6rem 0.9rem;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
      }
      .btn-secondary {
        background: #334155;
      }
      .muted {
        color: #475569;
      }
      .htmx-indicator {
        display: none;
      }
      .htmx-request .htmx-indicator,
      .htmx-request.htmx-indicator {
        display: inline-flex;
      }
      .loading-inline {
        display: inline-flex;
        gap: 0.5rem;
        align-items: center;
        color: #475569;
      }
      .banner-warn {
        background: #ffedd5;
        border: 1px solid #fdba74;
        color: var(--warn);
        border-radius: 8px;
        padding: 0.75rem;
        margin-bottom: 1rem;
      }
      .result {
        border-left: 4px solid var(--accent);
        padding-left: 0.8rem;
      }
      .results-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.75rem;
      }
      .results-meta-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .pager-inline .uk-pagination {
        margin: 0;
      }
      .pager-dock {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 0.75rem;
        z-index: 30;
        background: rgba(248, 250, 252, 0.94);
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 0.25rem 0.6rem;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(2px);
      }
      .pager-dock .uk-pagination {
        margin: 0;
      }
      .result.card {
        margin-bottom: 0;
      }
      .result-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 0.5rem;
      }
      .result-head h3 {
        margin: 0;
      }
      .result-title {
        font-size: 1.35rem;
        line-height: 1.2;
      }
      .result-family {
        margin-top: 0.35rem;
        margin-bottom: 0.25rem;
        font-size: 0.9rem;
      }
      .result-description {
        margin-top: 0.25rem;
        margin-bottom: 0.45rem;
      }
      .product-id-badge {
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #1e3a8a;
        background: #dbeafe;
        border: 1px solid #93c5fd;
        border-radius: 999px;
        padding: 0.2rem 0.55rem;
        white-space: nowrap;
      }
      .embed-details pre {
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 140px;
        overflow: auto;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 0.5rem;
      }
      .prompt-text-block {
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 240px;
        overflow: auto;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 0.6rem;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 0.75rem;
      }
      .stat-value {
        font-size: 2rem;
        margin: 0.4rem 0;
        font-weight: 700;
      }
      @media (max-width: 980px) {
        .results-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (max-width: 720px) {
        .control-row {
          grid-template-columns: auto minmax(64px, 1fr);
        }
        .results-grid {
          grid-template-columns: 1fr;
        }
        .pager-dock {
          width: calc(100vw - 1rem);
          max-width: 100%;
          border-radius: 14px;
          left: 0.5rem;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <nav class="top-nav">
        <a href="{% url 'web:search' %}">Search</a>
        <a href="{% url 'web:stats' %}">Data stats</a>
      </nav>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
