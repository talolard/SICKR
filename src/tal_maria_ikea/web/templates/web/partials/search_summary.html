<section class="card">
  <h3>AI summary</h3>
  {% if summary %}
    <p>{{ summary }}</p>
    {% if summary_items %}
      <ul class="uk-list uk-list-bullet uk-margin-small-top">
        {% for item in summary_items %}
          <li>
            <strong>{{ item.item_name }}</strong> ({{ item.canonical_product_key }}): {{ item.why }}
          </li>
        {% endfor %}
      </ul>
    {% endif %}
  {% else %}
    <p class="muted">Summary unavailable right now.</p>
  {% endif %}
</section>
